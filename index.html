<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inflable tracker</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>
<body>
    <div id="desktop-warning">
        <span class="material-icons" style="font-size: 48px;">smartphone</span>
        <h2>App Móvil</h2>
        <p>Esta aplicación está diseñada exclusivamente para su uso en dispositivos móviles.</p>
    </div>

    <div id="app-container">
        <header class="sticky-header">
            <div class="header-info">
            <span id="current-date" class="date-text"></span>
            <div class="stats-container">
                <span class="participant-count"><span id="count-number">0</span> Hoy</span>
                <span class="active-count"><span id="active-number">0</span> Activos</span>
            </div>
            </div>

            <div class="header-actions">
                <button id="mute-toggle" class="icon-btn">
                    <span class="material-icons" id="mute-icon">volume_up</span>
                </button>

                <button id="clean-old-btn" class="icon-btn" style="color: var(--warning-color);" title="Limpiar inactivos">
                    <span class="material-icons">cleaning_services</span>
                </button>

                <button id="reset-btn" class="icon-btn text-danger" title="Borrar todo">
                    <span class="material-icons">delete_sweep</span>
                </button>

                <button id="theme-toggle" class="icon-btn">
                    <span class="material-icons" id="theme-icon">dark_mode</span>
                </button>
            </div>

            <audio id="alarm-sound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" preload="auto"></audio>
            
        </header>

        <main>
            <div class="add-section">
                <button id="show-add-form-btn" class="fab-btn">
                    <span class="material-icons">add</span>
                </button>
                <div id="add-form" class="hidden form-card">
                    <input type="text" id="participant-name" placeholder="Nombre del participante" autocomplete="off">
                    
                    <div class="payment-section">
                        <p class="section-label">¿Pagó?</p>
                        <div class="radio-group">
                            <label><input type="radio" name="paid-status" value="si" checked> Sí</label>
                            <label><input type="radio" name="paid-status" value="pendiente"> Pendiente</label>
                        </div>
                    </div>

                    <div id="payment-method-section" class="payment-section">
                        <p class="section-label">Método de pago</p>

                      <select id="payment-method" class="custom-select">
                            <option value="" disabled selected>Seleccionar</option>
                            <option value="efectivo">Efectivo</option>
                            <option value="transferencia">Transferencia</option>
                      </select>

                    </div>

                    <div class="action-buttons">
                        <button id="start-15-btn" class="primary-btn">Iniciar 15 min</button>
                        <button id="start-20-btn" class="primary-btn">Iniciar 20 min</button>
                    </div>
                </div>
            </div>

            <ul id="participant-list" class="participant-list">
                </ul>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
